backend:
  name: git-gateway
  repo: Actionleader/zhixing-edu-website
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "blog"
    label: "教育文章"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發佈日期", name: "date", widget: "datetime" }
      - { label: "摘要", name: "excerpt", widget: "string" }
      - { label: "標籤", name: "tags", widget: "list", default: ["教育資訊"] }
      - { label: "內文", name: "body", widget: "markdown" }

  - name: "pages"
    label: "頁面內容"
    files:
      - label: "首頁 Banner"
        name: "banner"
        file: "_data/banner.json"
        fields:
          - { label: "標題行一", name: "line1", widget: "string", default: "2026 暑期特訓班" }
          - { label: "標題行二", name: "line2", widget: "string", default: "暑期英文全面提升" }
          - { label: "副標題", name: "subtitle", widget: "string", default: "聽說讀寫 · 小班教學 · 星級導師" }
          - { label: "按鈕文字", name: "button", widget: "string", default: "了解詳情 →" }
          - { label: "連結", name: "link", widget: "string", default: "blog/articles/2026-summer-program.html" }
          - { label: "背景圖片", name: "image", widget: "image", default: "assets/images/summer-hero-bg.jpg" }

site_url: https://actionleader.com.hk
display_url: https://actionleader.com.hk
logo_url: https://actionleader.com.hk/assets/images/zhixing-logo.png
locale: "zh_HK"
