<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 頁面不存在 | 知行教育中心</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl) var(--space-md);
    }
    .error-page__code {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      color: var(--color-primary);
      opacity: 0.15;
      line-height: 1;
      margin-bottom: -0.25em;
    }
    .error-page h1 {
      margin-bottom: var(--space-sm);
    }
    .error-page p {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-lg);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="page-wrapper">
      <a href="/" class="logo">
        <img src="/assets/images/zhixing-logo.png" alt="知行教育中心" height="48" width="auto" style="height:48px;width:auto;">
        <span class="logo-text">知行教育中心</span>
      </a>
    </div>
  </header>

  <main class="error-page">
    <div>
      <div class="error-page__code">404</div>
      <h1>頁面不存在</h1>
      <p>抱歉，您所尋找的頁面可能已被移除、名稱已變更或暫時無法使用。</p>
      <a href="/" class="btn btn-primary">返回首頁</a>
    </div>
  </main>

  <footer class="site-footer" style="margin-top:0;">
    <div class="page-wrapper">
      <div class="footer-bottom">
        &copy; 2026 知行教育中心 版權所有
      </div>
    </div>
  </footer>
</body>
</html>
